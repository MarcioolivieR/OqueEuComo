<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóia - O que vamos comer?</title>
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4757">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body>

    <div id="meal-selector" class="overlay">
        <div class="modal">
            <h2>Qual a Bóia de agora?</h2>
            <div class="meal-options">
                <button class="meal-btn" data-meal="cafe">☕ Café da Manhã</button>
                <button class="meal-btn" data-meal="almoco">🍽️ Almoço</button>
                <button class="meal-btn" data-meal="lanche">🥪 Lanche</button>
                <button class="meal-btn" data-meal="jantar">🍕 Jantar</button>
                <button class="meal-btn" data-meal="merenda">🍪 Merendar</button>
            </div>
        </div>
    </div>

    <main class="container">
        <header>
            <h1>Bóia</h1>
            <div class="status-bar">
                <p id="meal-type-display">Selecione uma refeição</p>
                <button id="btn-change-meal" class="btn-mini">🔄 Trocar</button>
            </div>
        </header>

        <div class="card">
            <div id="display-area">
                <div class="placeholder-icon">❓</div>
                <h2 id="food-name">Estou com fome de...</h2>
            </div>

            <button id="btn-decide" class="btn-primary">SORTEAR MINHA BÓIA</button>
            
            <input type="file" id="camera-input" accept="image/*" capture="camera" style="display: none;">
            <button id="btn-photo" class="btn-camera" style="display: none;">📷 TIRAR FOTO DA BÓIA</button>
            <button id="btn-share" class="btn-share" style="display: none;">📤 COMPARTILHAR</button>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <span class="brand-b">B</span>
            <p>Bóia App - 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
